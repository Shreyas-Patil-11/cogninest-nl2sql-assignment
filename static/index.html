<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL2SQL Clinic Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 30px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-bubble {
            display: inline-block;
            padding: 15px 20px;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .message.user .message-bubble {
            background: #667eea;
            color: white;
        }
        
        .message.bot .message-bubble {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .sql-query {
            background: #2d3748;
            color: #68d391;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        
        .results-table {
            margin-top: 15px;
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .results-table th,
        .results-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .results-table th {
            background: #f7fafc;
            font-weight: 600;
        }
        
        .input-container {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        
        #questionInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #questionInput:focus {
            border-color: #667eea;
        }
        
        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #sendButton:hover {
            transform: scale(1.05);
        }
        
        #sendButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .example-questions {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e2e8f0;
        }
        
        .example-questions h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .example-btn {
            display: inline-block;
            padding: 8px 15px;
            margin: 5px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Clinic NL2SQL Chatbot</h1>
            <p>Ask questions about patients, doctors, appointments, and revenue in natural language</p>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="message-bubble">
                    👋 Hello! I'm your clinic management assistant. Ask me anything about patients, doctors, appointments, treatments, or invoices!
                </div>
            </div>
        </div>
        
        <div class="example-questions">
            <h3>💡 Try these examples:</h3>
            <button class="example-btn" onclick="askQuestion('How many patients do we have?')">Patient count</button>
            <button class="example-btn" onclick="askQuestion('Which doctor has the most appointments?')">Busiest doctor</button>
            <button class="example-btn" onclick="askQuestion('Show top 5 patients by spending')">Top spenders</button>
            <button class="example-btn" onclick="askQuestion('What is the total revenue?')">Total revenue</button>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="questionInput" 
                placeholder="Ask a question about the clinic data..."
                onkeypress="if(event.key === 'Enter') sendQuestion()"
            >
            <button id="sendButton" onclick="sendQuestion()">Send</button>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000/chat';
        
        function addMessage(text, isUser, sqlQuery = null, columns = null, rows = null) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            let content = `<div class="message-bubble">${text}</div>`;
            
            if (sqlQuery) {
                content += `<div class="sql-query">${sqlQuery}</div>`;
            }
            
            if (columns && rows && rows.length > 0) {
                let table = '<table class="results-table"><thead><tr>';
                columns.forEach(col => {
                    table += `<th>${col}</th>`;
                });
                table += '</tr></thead><tbody>';
                
                rows.slice(0, 10).forEach(row => {
                    table += '<tr>';
                    row.forEach(cell => {
                        table += `<td>${cell !== null ? cell : 'N/A'}</td>`;
                    });
                    table += '</tr>';
                });
                
                if (rows.length > 10) {
                    table += `<tr><td colspan="${columns.length}" style="text-align:center; font-style:italic;">... and ${rows.length - 10} more rows</td></tr>`;
                }
                
                table += '</tbody></table>';
                content += table;
            }
            
            messageDiv.innerHTML = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const button = document.getElementById('sendButton');
            const question = input.value.trim();
            
            if (!question) return;
            
            // Add user message
            addMessage(question, true);
            input.value = '';
            
            // Disable input
            button.disabled = true;
            button.innerHTML = '<span class="loading"></span>';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question })
                });
                
                const data = await response.json();
                
                // Add bot response
                addMessage(
                    data.message,
                    false,
                    data.sql_query,
                    data.columns,
                    data.rows
                );
                
            } catch (error) {
                addMessage('❌ Error: ' + error.message, false);
            } finally {
                button.disabled = false;
                button.textContent = 'Send';
            }
        }
        
        function askQuestion(question) {
            document.getElementById('questionInput').value = question;
            sendQuestion();
        }
    </script>
</body>
</html>
